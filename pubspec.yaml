name: multilingual_chat_app
description: AI-Powered Cross-Platform Multilingual Video Chat Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # State Management
  flutter_riverpod: ^2.3.6

  # Networking & Real-time Communication
  socket_io_client: ^2.0.3+1
  http: ^1.2.0

  # WebRTC for Video Calling
  flutter_webrtc: ^1.4.1

  # Authentication & Storage
  shared_preferences: ^2.2.0

  # Media & Audio Processing
  record: ^6.1.2
  just_audio: ^0.9.34

  # UI Components
  intl: ^0.18.1

  # Permissions
  permission_handler: ^11.0.1
  flutter_contacts: ^1.1.1
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  url_launcher: ^6.3.1
  supabase_flutter: ^2.12.4
  flutter_dotenv: ^5.2.1
  just_audio_windows: ^0.2.3
  speech_to_text: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
  # fonts: (removed — add font files under `fonts/` if you need custom fonts)

dependency_overrides:
  record_platform_interface: ^1.4.0

